name: OnePlus13 6.6 · ResUK+BBG+ZeroTol+SUS-FS (源码版本名)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y git build-essential clang lld llvm libssl-dev libelf-dev flex bison bc zip curl python3 python3-pip

      - name: 克隆指定内核源码
        run: |
          git clone --depth=1 https://github.com/brokestar233/android_kernel_common_oneplus_sm8750 kernel

      # 不手动修改版本号，使用源码自带的内核名称
      # - name: 设置内核版本信息
      #   run: |
      #     cd kernel
      #     echo "xxx" > .version

      - name: 应用 SUS-FS
        run: |
          cd kernel
          git clone --depth=1 https://github.com/SUS-Space/SUS-FS.git SUS-FS
          python3 SUS-FS/apply.py

      - name: 应用 ZeroTolerance
        run: |
          cd kernel
          git clone --depth=1 https://github.com/Imprvdteam/ZeroTolerance.git ZeroTolerance
          python3 ZeroTolerance/apply.py

      - name: 应用 BBG
        run: |
          cd kernel
          git clone --depth=1 https://github.com/imshine/BBG.git BBG
          python3 BBG/apply.py

      - name: 应用 ResurrectionSU
        run: |
          cd kernel
          git clone --depth=1 https://github.com/viragsairaj/ResurrectionSU.git ResSU
          python3 ResSU/apply_patch.py

      - name: 编译内核
        run: |
          cd kernel
          export ARCH=arm64
          export LLVM=1
          export CC=clang
          export CROSS_COMPILE=aarch64-linux-gnu-
          export LOCALVERSION=""
          make vendor/lahaina-qgki_defconfig
          make -j$(nproc)

      - name: 打包 AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AK3
          cp kernel/out/arch/arm64/boot/Image.gz AK3/
          cd AK3
          zip -r9 OP13_Source_Version_Kernel.zip *

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: OP13_Source_Version_Kernel
          path: AK3/OP13_Source_Version_Kernel.zip
